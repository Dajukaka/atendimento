<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Guanabara Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* Estrutura Principal */
        body { 
            background: #000; 
            color: #ffcc00; 
            font-family: 'Arial Black', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: row; /* Alinha Main e Sidebar lado a lado */
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }

        /* Área da Esquerda (Guanabara e Cards) */
        .main { 
            flex: 1; /* Ocupa todo o espaço restante */
            display: flex; 
            flex-direction: column; 
            border-right: 3px solid #333; 
        }

        /* Área da Direita (Histórico e Config) */
        .sidebar { 
            width: 350px; /* Largura fixa para a barra lateral */
            background: #0a0a0a; 
            display: flex; 
            flex-direction: column; 
        }

        .header { 
            text-align: center; 
            font-size: 3.5em; 
            padding: 15px; 
            color: #ffaa00; 
            background: #111; 
            letter-spacing: 5px; 
            border-bottom: 2px solid #333; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            padding: 25px; 
            overflow-y: auto; 
            flex-grow: 1; 
        }

        /* Estilo do Card */
        .card-chamada { 
            background: #e74c3c; 
            color: #fff; 
            border-radius: 15px; 
            height: 200px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 0 25px #e74c3c; 
            border: 5px solid #fff; 
            animation: entra 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .num-grande { font-size: 8em; line-height: 1; }

        /* Estilo Sidebar */
        .hist-header { 
            background: #222; 
            padding: 15px; 
            text-align: center; 
            font-size: 1.8em; 
            color: #ffaa00; 
            border-bottom: 3px solid #ffaa00; 
        }

        .hist-lista { 
            padding: 10px; 
            overflow-y: auto; 
            flex-grow: 1; 
        }

        .hist-item { 
            background: #1a1a1a; 
            padding: 12px; 
            margin-bottom: 10px; 
            border-left: 6px solid #ffaa00; 
            border-radius: 4px; 
            color: #fff; 
        }

        /* Rodapé com Botão */
        .menu-container { 
            background: #111; 
            padding: 20px; 
            border-top: 2px solid #333; 
        }

        .btn-config { 
            width: 100%; 
            padding: 15px; 
            background: #333; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1em; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-config:hover { background: #444; }

        @keyframes entra { from { transform: scale(0); } to { transform: scale(1); } }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div class="main">
        <div class="header">GUANABARA</div>
        <div id="grid-dinamica" class="grid"></div>
    </div>

    <div class="sidebar">
        <div class="hist-header">HISTÓRICO</div>
        <div id="lista-historico" class="hist-lista"></div>
        
        <div class="menu-container">
            <button class="btn-config" onclick="alert('Configurações do Firebase em breve!')">
                <span>⚙️</span> CONFIGURAÇÕES
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCJu0tGeJSMt-9HXRVT2Ijsdh-Z1NzJYmg",
            databaseURL: "https://guanabara-atendimento-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let chamadasAtivas = new Set();

        db.ref('atendimento').on('value', (snapshot) => {
            const dados = snapshot.val();
            if (dados && dados.maquina) {
                adicionarCard(dados.maquina);
            }
        });

        function adicionarCard(id) {
            if (chamadasAtivas.has(id)) return;

            // Áudio
            const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
            audio.play().catch(() => {});

            // Inserir Card
            const grid = document.getElementById('grid-dinamica');
            const card = document.createElement('div');
            card.className = 'card-chamada blink';
            card.id = 'card-' + id;
            card.innerHTML = `<span style="font-size:1.5em">MÁQUINA</span><span class="num-grande">${id}</span>`;
            grid.prepend(card);

            // Inserir Histórico
            const lista = document.getElementById('lista-historico');
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.innerHTML = `<small>${new Date().toLocaleTimeString()}</small><div>MAQ. ${id}</div>`;
            lista.prepend(item);

            chamadasAtivas.add(id);
            
            // Remove card após 45 seg
            setTimeout(() => {
                const el = document.getElementById('card-' + id);
                if (el) el.remove();
                chamadasAtivas.delete(id);
            }, 45000);
        }

        document.body.onclick = () => console.log("Som ativado");
    </script>
</body>
</html>
