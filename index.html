<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel Guanabara Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { background: #000; color: #ffaa00; font-family: sans-serif; text-align: center; }
        #alerta { font-size: 10em; margin-top: 100px; display: none; color: #fff; background: #c0392b; padding: 50px; border: 10px solid #fff; border-radius: 20px; animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }
        .instrucao { color: #555; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>PAINEL DE CHAMADAS GUANABARA</h1>
    <div id="alerta">MÁQUINA <span id="num-maq">0</span></div>
    <p class="instrucao">Aguardando sinais do ESP32 via Firebase...</p>

    <script>
        // --- COLE SUAS CONFIGURAÇÕES DO FIREBASE AQUI ---
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            databaseURL: "https://seu-projeto.firebaseio.com",
            projectId: "seu-projeto",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Tabela de De-Para (Código do Controle : Número da Máquina)
        const maquinas = {
            "1234567": 1,
            "9876543": 2,
            "5554443": 3
        };

        // Escuta mudanças no Firebase em tempo real
      // O seu print mostra que os dados estão dentro de "atendimento"
db.ref('atendimento').on('value', (snapshot) => {
    const dados = snapshot.val();
    if (dados && dados.maquina) {
        // Exibe o número que está lá no Firebase (neste caso, o 6)
        document.getElementById('num-maq').innerText = dados.maquina;
        document.getElementById('alerta').style.display = 'block';

        // Toca o som de alerta
        const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        audio.play();

        // Esconde após 30 segundos
        setTimeout(() => {
            document.getElementById('alerta').style.display = 'none';
        }, 30000);
    }
});
    </script>
</body>
</html>
